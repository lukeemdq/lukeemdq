name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Stats SVG com acesso a repos privados ──────────────────────────
      - name: Generate Stats SVG
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: lukeemdq
          # GITHUB_TOKEN tem acesso a repos privados automaticamente
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          count_private: true
          include_all_commits: true
          show_icons: true
          theme: dracula
          hide_border: true
          output_path: dist/stats.svg

      # ── Snake animation ────────────────────────────────────────────────
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: lukeemdq
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#a855f7&color_dots=#1e1b4b,#312e81,#4338ca,#6366f1,#818cf8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#0d1117,#1e1b4b,#312e81,#4338ca,#818cf8

      # ── Push tudo para o branch output ────────────────────────────────
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "chore: update profile assets [skip ci]"